x-go-build-args: &go-build-args
  IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
  GO_IMAGE: ${GO_DOCKER_IMAGE:-golang:1.25-alpine}
  ALPINE_IMAGE: ${ALPINE_DOCKER_IMAGE:-alpine:3.22}
  GOPROXY: ${GO_DOCKER_GOPROXY:-https://proxy.golang.org,direct}
  GOSUMDB: ${GO_DOCKER_GOSUMDB:-sum.golang.org}
  ALPINE_MIRROR: ${ALPINE_MIRROR:-}

x-go-service-build: &go-service-build
  context: ..
  dockerfile: deploy/docker/full/go-service.Dockerfile
  args:
    <<: *go-build-args

x-common-env: &common-env
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
  TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:?set TOKEN_HASH_SECRET}

x-service-healthcheck: &service-healthcheck
  interval: 10s
  timeout: 5s
  retries: 24
  start_period: 10s

services:
  migrate:
    image: ${MIGRATE_IMAGE:-software-teamwork/docker-tools:cloud}
    build:
      context: ..
      dockerfile: deploy/docker/full/go-tools.Dockerfile
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
        GO_IMAGE: ${GO_DOCKER_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_DOCKER_IMAGE:-alpine:3.22}
        GOPROXY: ${GO_DOCKER_GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GO_DOCKER_GOSUMDB:-sum.golang.org}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    environment:
      AUTH_DATABASE_URL: ${AUTH_MIGRATION_DATABASE_URL:-${AUTH_DATABASE_URL:?set AUTH_DATABASE_URL}}
      FILE_DATABASE_URL: ${FILE_MIGRATION_DATABASE_URL:-${FILE_DATABASE_URL:?set FILE_DATABASE_URL}}
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_MIGRATION_DATABASE_URL:-${KNOWLEDGE_DATABASE_URL:?set KNOWLEDGE_DATABASE_URL}}
      QA_DATABASE_URL: ${QA_MIGRATION_DATABASE_URL:-${QA_DATABASE_URL:?set QA_DATABASE_URL}}
      DOCUMENT_DATABASE_URL: ${DOCUMENT_MIGRATION_DATABASE_URL:-${DOCUMENT_DATABASE_URL:?set DOCUMENT_DATABASE_URL}}
      AI_GATEWAY_DATABASE_URL: ${AI_GATEWAY_MIGRATION_DATABASE_URL:-${AI_GATEWAY_DATABASE_URL:?set AI_GATEWAY_DATABASE_URL}}
      DOCKER_MIGRATE_ENABLED: ${DOCKER_MIGRATE_ENABLED:-true}
    command: ["docker-migrate"]
    restart: "no"

  seed:
    image: ${MIGRATE_IMAGE:-software-teamwork/docker-tools:cloud}
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      POSTGRES_ADMIN_URL: ${POSTGRES_ADMIN_URL:?set POSTGRES_ADMIN_URL}
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_DATABASE_URL:?set KNOWLEDGE_DATABASE_URL}
      AI_GATEWAY_DATABASE_URL: ${AI_GATEWAY_DATABASE_URL:?set AI_GATEWAY_DATABASE_URL}
      QA_DATABASE_URL: ${QA_DATABASE_URL:?set QA_DATABASE_URL}
      AI_GATEWAY_SERVICE_TOKEN_HASHES: ${AI_GATEWAY_SERVICE_TOKEN_HASHES:?set AI_GATEWAY_SERVICE_TOKEN_HASHES}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY:?set AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF:?set AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF}
      AI_GATEWAY_LOCAL_SEED_ENABLED: ${AI_GATEWAY_LOCAL_SEED_ENABLED:-true}
      AI_GATEWAY_LOCAL_PROVIDER: ${AI_GATEWAY_LOCAL_PROVIDER:-openai_compatible}
      AI_GATEWAY_LOCAL_PROVIDER_BASE_URL: ${AI_GATEWAY_LOCAL_PROVIDER_BASE_URL:?set AI_GATEWAY_LOCAL_PROVIDER_BASE_URL}
      AI_GATEWAY_LOCAL_PROVIDER_API_KEY: ${AI_GATEWAY_LOCAL_PROVIDER_API_KEY:?set AI_GATEWAY_LOCAL_PROVIDER_API_KEY}
      AI_GATEWAY_LOCAL_CHAT_MODEL: ${AI_GATEWAY_LOCAL_CHAT_MODEL:?set AI_GATEWAY_LOCAL_CHAT_MODEL}
      AI_GATEWAY_LOCAL_EMBEDDING_MODEL: ${AI_GATEWAY_LOCAL_EMBEDDING_MODEL:-}
      AI_GATEWAY_LOCAL_EMBEDDING_DIMENSIONS: ${AI_GATEWAY_LOCAL_EMBEDDING_DIMENSIONS:-1024}
      AI_GATEWAY_LOCAL_RERANK_MODEL: ${AI_GATEWAY_LOCAL_RERANK_MODEL:-}
      AI_GATEWAY_LOCAL_RERANK_TOP_N: ${AI_GATEWAY_LOCAL_RERANK_TOP_N:-5}
      AI_GATEWAY_TIMEOUT: ${AI_GATEWAY_TIMEOUT:-120s}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
      PADDLEOCR_BASE_URL: ${PADDLEOCR_BASE_URL:-https://paddleocr.aistudio-app.com}
      PADDLEOCR_ACCESS_TOKEN: ${PADDLEOCR_ACCESS_TOKEN:?set PADDLEOCR_ACCESS_TOKEN}
      PADDLEOCR_ALGORITHM: ${PADDLEOCR_ALGORITHM:-PP-StructureV3}
      DOCKER_SEED_ENABLED: ${DOCKER_SEED_ENABLED:-true}
    command: ["docker-seed"]
    restart: "no"

  auth:
    image: ${AUTH_IMAGE:-software-teamwork/auth:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/auth
        TARGET: ./cmd/server
        BINARY: auth-server
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      AUTH_ENV: docker-cloud
      AUTH_HTTP_ADDR: :8001
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:?set AUTH_DATABASE_URL}
      AUTH_GATEWAY_ADMIN_SERVICE_TOKEN: ${AUTH_GATEWAY_ADMIN_SERVICE_TOKEN:?set AUTH_GATEWAY_ADMIN_SERVICE_TOKEN}
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8001/readyz || exit 1"]

  file:
    image: ${FILE_IMAGE:-software-teamwork/file:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/file
        TARGET: ./cmd/server
        BINARY: file-server
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      FILE_ENV: docker-cloud
      FILE_HTTP_ADDR: :8082
      FILE_DATABASE_URL: ${FILE_DATABASE_URL:?set FILE_DATABASE_URL}
      FILE_STORAGE_BACKEND: minio
      FILE_MINIO_ENDPOINT: ${FILE_MINIO_ENDPOINT:?set FILE_MINIO_ENDPOINT}
      FILE_MINIO_ACCESS_KEY: ${FILE_MINIO_ACCESS_KEY:?set FILE_MINIO_ACCESS_KEY}
      FILE_MINIO_SECRET_KEY: ${FILE_MINIO_SECRET_KEY:?set FILE_MINIO_SECRET_KEY}
      FILE_MINIO_BUCKET: ${FILE_MINIO_BUCKET:?set FILE_MINIO_BUCKET}
      FILE_MINIO_USE_SSL: ${FILE_MINIO_USE_SSL:-true}
      FILE_MINIO_REGION: ${FILE_MINIO_REGION:-}
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8082/readyz || exit 1"]

  knowledge:
    image: ${KNOWLEDGE_IMAGE:-software-teamwork/knowledge:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/knowledge
        TARGET: ./cmd/adapter
        BINARY: knowledge-adapter
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      KNOWLEDGE_ENV: docker-cloud
      KNOWLEDGE_HTTP_ADDR: :8083
      KNOWLEDGE_MCP_ADDR: :8093
      KNOWLEDGE_MCP_ROLES: ${KNOWLEDGE_MCP_ROLES:-admin}
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_DATABASE_URL:?set KNOWLEDGE_DATABASE_URL}
      DATABASE_URL: ${KNOWLEDGE_DATABASE_URL:?set KNOWLEDGE_DATABASE_URL}
      VENDOR_RUNTIME_URL: ${VENDOR_RUNTIME_URL:?set VENDOR_RUNTIME_URL}
      VENDOR_RUNTIME_SERVICE_TOKEN: ${VENDOR_RUNTIME_SERVICE_TOKEN:?set VENDOR_RUNTIME_SERVICE_TOKEN}
      KNOWLEDGE_VENDOR_EMBEDDING_ID: ${KNOWLEDGE_VENDOR_EMBEDDING_ID:-default-embedding}
      KNOWLEDGE_VENDOR_RERANK_ID: ${KNOWLEDGE_VENDOR_RERANK_ID:-default-rerank}
      KNOWLEDGE_RUNTIME_READINESS_MODE: ${KNOWLEDGE_RUNTIME_READINESS_MODE:-query}
      KNOWLEDGE_AUTO_START_INGESTION: ${KNOWLEDGE_AUTO_START_INGESTION:-true}
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8083/readyz || exit 1"]

  ai-gateway:
    image: ${AI_GATEWAY_IMAGE:-software-teamwork/ai-gateway:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/ai-gateway
        TARGET: ./cmd/server
        BINARY: ai-gateway-server
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      AI_GATEWAY_HTTP_ADDR: :8086
      AI_GATEWAY_DATABASE_URL: ${AI_GATEWAY_DATABASE_URL:?set AI_GATEWAY_DATABASE_URL}
      AI_GATEWAY_SERVICE_TOKEN_HASHES: ${AI_GATEWAY_SERVICE_TOKEN_HASHES:?set AI_GATEWAY_SERVICE_TOKEN_HASHES}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY:?set AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF:?set AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF}
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8086/readyz || exit 1"]

  document:
    image: ${DOCUMENT_IMAGE:-software-teamwork/document:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/document
        TARGET: ./cmd/server
        BINARY: document-server
    depends_on:
      file:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    environment:
      <<: *common-env
      DOCUMENT_HTTP_ADDR: :8085
      DOCUMENT_DATABASE_URL: ${DOCUMENT_DATABASE_URL:?set DOCUMENT_DATABASE_URL}
      DOCUMENT_REDIS_ADDR: ${DOCUMENT_REDIS_ADDR:?set DOCUMENT_REDIS_ADDR}
      DOCUMENT_FILE_SERVICE_URL: http://file:8082
      DOCUMENT_AI_GATEWAY_URL: http://ai-gateway:8086/internal/v1
      DOCUMENT_AI_GATEWAY_PROFILE_ID: ${DOCUMENT_AI_GATEWAY_PROFILE_ID:-default-chat}
      DOCUMENT_AI_GATEWAY_MODEL: ${DOCUMENT_AI_GATEWAY_MODEL:-${AI_GATEWAY_LOCAL_CHAT_MODEL:?set AI_GATEWAY_LOCAL_CHAT_MODEL}}
      DOCUMENT_KNOWLEDGE_SERVICE_URL: http://knowledge:8083
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8085/readyz || exit 1"]

  qa:
    image: ${QA_IMAGE:-software-teamwork/qa:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/qa
        TARGET: ./cmd/server
        BINARY: qa-server
    depends_on:
      file:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
      document:
        condition: service_healthy
    environment:
      <<: *common-env
      QA_HTTP_ADDR: :8084
      QA_DATABASE_URL: ${QA_DATABASE_URL:?set QA_DATABASE_URL}
      KNOWLEDGE_SERVICE_URL: http://knowledge:8083
      FILE_SERVICE_BASE_URL: http://file:8082
      AI_GATEWAY_URL: http://ai-gateway:8086/internal/v1/chat/completions
      AI_GATEWAY_PROFILE_ID: ${AI_GATEWAY_PROFILE_ID:-default-chat}
      MODEL_ID: ${MODEL_ID:-${AI_GATEWAY_LOCAL_CHAT_MODEL:?set AI_GATEWAY_LOCAL_CHAT_MODEL}}
      AI_GATEWAY_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      AI_GATEWAY_TIMEOUT: ${AI_GATEWAY_TIMEOUT:-120s}
      MCP_TRANSPORT: streamable_http
      MCP_SERVER_ALIAS: document
      MCP_SERVER_URL: http://document:8085/mcp
      MCP_SERVER_TOKEN: ${MCP_SERVER_TOKEN:-${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}}
      MCP_SERVER_TOKEN_HEADER: Authorization
      KNOWLEDGE_MCP_URL: http://knowledge:8093
      KNOWLEDGE_MCP_TOKEN: ${KNOWLEDGE_MCP_TOKEN:-${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}}
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8084/readyz || exit 1"]

  gateway:
    image: ${GATEWAY_IMAGE:-software-teamwork/gateway:cloud}
    build:
      <<: *go-service-build
      args:
        <<: *go-build-args
        SERVICE_DIR: services/gateway
        TARGET: ./cmd/server
        BINARY: gateway-server
    depends_on:
      auth:
        condition: service_healthy
      file:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      qa:
        condition: service_healthy
      document:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    environment:
      <<: *common-env
      GATEWAY_ENV: docker-cloud
      GATEWAY_HTTP_ADDR: :8080
      GATEWAY_METRICS_ADDR: :9091
      GATEWAY_REDIS_ADDR: ${GATEWAY_REDIS_ADDR:?set GATEWAY_REDIS_ADDR}
      GATEWAY_REDIS_PASSWORD: ${GATEWAY_REDIS_PASSWORD:-}
      GATEWAY_REDIS_DB: ${GATEWAY_REDIS_DB:-0}
      GATEWAY_AUTH_ADMIN_SERVICE_TOKEN: ${GATEWAY_AUTH_ADMIN_SERVICE_TOKEN:?set GATEWAY_AUTH_ADMIN_SERVICE_TOKEN}
      GATEWAY_AUTH_BASE_URL: http://auth:8001
      GATEWAY_KNOWLEDGE_BASE_URL: http://knowledge:8083
      GATEWAY_QA_BASE_URL: http://qa:8084
      GATEWAY_DOCUMENT_BASE_URL: http://document:8085
      GATEWAY_AI_GATEWAY_BASE_URL: http://ai-gateway:8086
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:18080}
      GATEWAY_CORS_ALLOW_CREDENTIALS: ${GATEWAY_CORS_ALLOW_CREDENTIALS:-true}
      GATEWAY_APP_VERSION_CURRENT_SHA: ${GATEWAY_APP_VERSION_CURRENT_SHA:-}
      GATEWAY_APP_VERSION_ALLOWED_SHAS: ${GATEWAY_APP_VERSION_ALLOWED_SHAS:-}
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/readyz || exit 1"]

  web:
    image: ${WEB_IMAGE:-software-teamwork/web:cloud}
    build:
      context: ..
      dockerfile: deploy/docker/full/frontend.Dockerfile
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
        BUN_IMAGE: ${BUN_DOCKER_IMAGE:-oven/bun:1.3.12-alpine}
        NGINX_IMAGE: ${NGINX_DOCKER_IMAGE:-nginx:1.27-alpine}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${DOCKER_FRONTEND_PORT:-18080}:80"
