services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-demo-postgres-password}
      POSTGRES_DB: postgres
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.18.2}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-09-07T16-13-09Z}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/software-teamwork-local
    restart: "no"

  knowledge-minio-init:
    profiles: ["knowledge-v2"]
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/software-teamwork-knowledge
    restart: "no"

  elasticsearch:
    profiles: ["knowledge-v2"]
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.11.3}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  knowledge-runtime-api:
    profiles: ["knowledge-v2"]
    build:
      context: ../services/knowledge-runtime
      dockerfile: Dockerfile
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
    command: ["./entrypoint.sh", "--disable-taskexecutor"]
    environment:
      DB_TYPE: postgres
      DOC_ENGINE: ${DOC_ENGINE:-elasticsearch}
      POSTGRES_DBNAME: knowledge_system
      POSTGRES_USER: knowledge_app
      POSTGRES_PASSWORD: knowledge_app_dev
      POSTGRES_HOST: postgres
      MINIO_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
      MINIO_HOST: minio
      MINIO_BUCKET: software-teamwork-knowledge
      ES_HOST: elasticsearch
      REDIS_HOST: redis
    ports:
      - "${KNOWLEDGE_RUNTIME_API_PORT:-9380}:9380"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      knowledge-minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9380/api/v1/system/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s

  knowledge-runtime-worker:
    profiles: ["knowledge-v2"]
    build:
      context: ../services/knowledge-runtime
      dockerfile: Dockerfile
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
    command: ["./entrypoint.sh", "--disable-webserver", "--workers=${KNOWLEDGE_RUNTIME_WORKERS:-2}"]
    environment:
      DB_TYPE: postgres
      DOC_ENGINE: ${DOC_ENGINE:-elasticsearch}
      POSTGRES_DBNAME: knowledge_system
      POSTGRES_USER: knowledge_app
      POSTGRES_PASSWORD: knowledge_app_dev
      POSTGRES_HOST: postgres
      MINIO_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
      MINIO_HOST: minio
      MINIO_BUCKET: software-teamwork-knowledge
      ES_HOST: elasticsearch
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      knowledge-minio-init:
        condition: service_completed_successfully
      knowledge-runtime-api:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  elasticsearch_data:
