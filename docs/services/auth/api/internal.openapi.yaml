openapi: 3.0.3
info:
  title: Power Knowledge Platform Auth Service API
  version: 0.1.0
  license:
    name: Unspecified
    url: https://github.com/Sakayori-Iroha-168/Software_Teamwork
  description: |
    Service-level API contract for the auth service.

    This file documents auth-owned internal service-to-service resources used by
    gateway. It is not the frontend-facing contract. Stable frontend paths remain
    owned by docs/services/gateway/api/public.openapi.yaml and are exposed through
    /api/v1/users, /api/v1/sessions, /api/v1/sessions/current, /api/v1/users/me,
    /api/v1/users/me/profile, /api/v1/users/me/password-changes, and
    /api/v1/admin/users resources.

    Internal admin user-management routes under /internal/v1/admin/** and
    current-user write routes for profile/password changes require the
    Gateway-only service credential configured by
    AUTH_GATEWAY_ADMIN_SERVICE_TOKEN. They are not authorized by the shared
    internal service token alone. Auth treats X-User-Roles and
    X-User-Permissions as forwarded context only; admin-user authorization is
    recomputed from ActorUserID against Auth-owned role data.

    All stable paths are RESTful resource-oriented paths. User registration is
    modeled as user creation, login as session creation, logout as session
    deletion, and token/session revocation as deleting a session resource.
    Access tokens are opaque bearer credentials, not JWTs; callers must not
    parse claims from them.
x-api-scope: internal-service
x-api-style:
  required: RESTful resource-oriented HTTP APIs
  appliesTo:
  - service-to-service HTTP APIs
  rules:
  - Use /internal/v1 for internal business resources.
  - Model stable routes as resources or resource collections.
  - Use HTTP methods for actions.
  - Do not put action verbs such as login, logout, register, revoke, validate, or check in stable paths.
  - Model authentication attempts as sessions.
  - Model permission lookup as user permission resources.
  exceptions:
  - GET /healthz
  - GET /readyz
servers:
- url: /
  description: Auth service root
security:
- serviceTokenAuth: []
tags:
- name: health
  description: Auth process and readiness checks.
- name: users
  description: User identity resources.
- name: admin-users
  description: Administrator user management resources.
- name: sessions
  description: Session and token resources.
- name: permissions
  description: User permission resources.
paths:
  /healthz:
    get:
      tags:
      - health
      summary: Liveness check
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Auth process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
  /readyz:
    get:
      tags:
      - health
      summary: Readiness check
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Auth is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Auth is not ready to serve one or more dependencies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '429':
          $ref: '#/components/responses/Error'
  /internal/v1/users:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    post:
      tags:
      - users
      summary: Create user
      operationId: createUser
      x-owner-service: auth
      description: |
        Creates a user resource and returns a newly issued session for gateway
        to cache. Gateway exposes this as POST /api/v1/users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User and session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /internal/v1/users/{userId}:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserId'
    get:
      tags:
      - users
      summary: Get user
      operationId: getUser
      x-owner-service: auth
      description: |
        Returns user identity and authorization summary for internal cache repair,
        admin workflows, or audit workflows. Gateway does not need to call this
        on every authenticated business request when Redis session cache is valid.
      responses:
        '200':
          description: User record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRecordResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /internal/v1/users/{userId}/permissions:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserId'
    get:
      tags:
      - permissions
      summary: Get user permissions
      operationId: getUserPermissions
      x-owner-service: auth
      description: |
        Returns the current roles and permission strings for a user. This resource
        is intended for cache refresh, permission-change propagation, and internal
        service boundary checks.
      responses:
        '200':
          description: User permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPermissionsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /internal/v1/users/{userId}/profile:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserId'
    patch:
      tags:
      - users
      summary: Update user profile
      operationId: updateUserProfile
      x-owner-service: auth
      description: |
        Updates current-user editable profile fields for the user identified by
        the trusted gateway user context. Auth rejects attempts to edit username,
        status, roles, permissions, or password-change state through this
        profile resource. This route requires the Gateway-only service token
        and CallerService=gateway.
      parameters:
      - $ref: '#/components/parameters/ActorUserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: User profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRecordResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/users/{userId}/password-changes:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserId'
    post:
      tags:
      - users
      summary: Change required password
      operationId: createUserPasswordChange
      x-owner-service: auth
      description: |
        Verifies the current temporary password, replaces the password hash,
        clears must_change_password, records a security event, and refreshes or
        revokes stale sessions as needed. This route is for the current user's
        required password-change flow, not administrator password reset. This
        route requires the Gateway-only service token and CallerService=gateway.
      parameters:
      - $ref: '#/components/parameters/ActorUserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePasswordChangeRequest'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRecordResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/admin/users:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/ActorUserIdHeader'
    - $ref: '#/components/parameters/ActorRolesHeader'
    - $ref: '#/components/parameters/ActorPermissionsHeader'
    get:
      tags:
      - admin-users
      summary: List manageable users
      operationId: listAdminUsers
      x-owner-service: auth
      description: |
        Lists users in the caller's manageable scope. Administrators see only
        standard users. Super administrators or system:admin callers see
        standard and admin users. super_admin rows are excluded.
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: username
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          maxLength: 128
      - name: role
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ManagedUserRole'
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/UserStatus'
      responses:
        '200':
          description: Manageable users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - admin-users
      summary: Create managed user
      operationId: createAdminUser
      x-owner-service: auth
      description: |
        Creates a managed user without returning a session. The supplied
        temporary password is hashed and the created credential is marked
        must_change_password=true. This does not replace public self-service
        POST /internal/v1/users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminUserRequest'
      responses:
        '201':
          description: Managed user created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/admin/users/{userId}:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/ActorUserIdHeader'
    - $ref: '#/components/parameters/ActorRolesHeader'
    - $ref: '#/components/parameters/ActorPermissionsHeader'
    - $ref: '#/components/parameters/UserId'
    patch:
      tags:
      - admin-users
      summary: Update managed user
      operationId: updateAdminUser
      x-owner-service: auth
      description: |
        Updates manageable profile fields, active/disabled status, or the
        managed role. Role changes are single-role replacement between standard
        and admin. Auth rejects super_admin targets and self-sensitive admin
        operations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminUserRequest'
      responses:
        '200':
          description: Managed user updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/admin/users/{userId}/password-resets:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/ActorUserIdHeader'
    - $ref: '#/components/parameters/ActorRolesHeader'
    - $ref: '#/components/parameters/ActorPermissionsHeader'
    - $ref: '#/components/parameters/UserId'
    post:
      tags:
      - admin-users
      summary: Reset managed user password
      operationId: createAdminUserPasswordReset
      x-owner-service: auth
      description: |
        Replaces the target user's password with an administrator-entered
        temporary password, sets must_change_password=true, records a security
        event, and invalidates or refreshes stale sessions. Auth rejects
        super_admin targets and admin self-reset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminPasswordResetRequest'
      responses:
        '200':
          description: Managed user password reset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/sessions:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    post:
      tags:
      - sessions
      summary: Create session
      operationId: createSession
      x-owner-service: auth
      description: |
        Creates a session resource from username and password credentials.
        Gateway exposes this as POST /api/v1/sessions and caches the returned
        user/session identity in Redis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /internal/v1/sessions/{sessionId}:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/SessionId'
    get:
      tags:
      - sessions
      summary: Get session
      operationId: getSession
      x-owner-service: auth
      description: |
        Returns session identity for cache repair, diagnostics, or security
        workflows. Gateway should use its Redis session cache as the default path
        for ordinary authenticated requests.
      responses:
        '200':
          description: Session identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIdentityResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - sessions
      summary: Delete session
      operationId: deleteSession
      x-owner-service: auth
      description: |
        Deletes or revokes a session resource. Gateway uses this for current
        session deletion after resolving the current session id from Redis, and
        auth can use it for user disablement, permission changes, or security
        events.
      responses:
        '204':
          description: Session deleted.
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Internal service credential used by gateway and trusted backend services. Admin user-management routes and current-user profile/password write routes require the Gateway-only credential, not the shared service token.
  parameters:
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Caller-provided request id. Auth should return the effective request id in response body and logs.
    CallerServiceHeader:
      name: X-Caller-Service
      in: header
      required: true
      schema:
        type: string
      description: Name of the internal caller, for audit and rate policy decisions.
    ActorUserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
      description: Authenticated user id resolved by gateway from the bearer session.
    ActorRolesHeader:
      name: X-User-Roles
      in: header
      required: false
      schema:
        type: string
      description: Comma-separated authenticated role codes resolved by gateway.
    ActorPermissionsHeader:
      name: X-User-Permissions
      in: header
      required: false
      schema:
        type: string
      description: Comma-separated authenticated permission codes resolved by gateway.
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: Public user id.
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: Auth-issued session id.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - status
          properties:
            status:
              type: string
              enum:
              - ok
        requestId:
          type: string
    ReadinessResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - service
          - status
          - version
          - environment
          - dependencies
          properties:
            service:
              type: string
              enum:
              - auth
            status:
              type: string
              enum:
              - ready
              - not_ready
            version:
              type: string
            environment:
              type: string
            dependencies:
              type: array
              items:
                $ref: '#/components/schemas/DependencyCheck'
        requestId:
          type: string
    DependencyCheck:
      type: object
      required:
      - name
      - status
      properties:
        name:
          type: string
          enum:
          - postgres
        status:
          type: string
          enum:
          - ready
          - unavailable
          - not_configured
        message:
          type: string
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
          enum:
          - validation_error
          - unauthorized
          - forbidden
          - not_found
          - conflict
          - rate_limited
          - dependency_error
          - internal_error
        message:
          type: string
        requestId:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    PageInfo:
      type: object
      required:
      - page
      - pageSize
      - total
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
    CreateUserRequest:
      type: object
      required:
      - username
      - password
      description: |
        Public self-service registration request forwarded by Gateway
        POST /api/v1/users. Creates a standard user, returns a session, and does
        not set must_change_password.
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 128
          description: Login username. Final format rules are owned by auth implementation.
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 1024
          writeOnly: true
          description: Plain password supplied only in the request body. Must never be logged or returned; auth stores an argon2id-v1 hash.
    CreateSessionRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 128
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 1024
          writeOnly: true
          description: Plain password supplied only in the request body. Must never be logged or returned; auth verifies it against an argon2id-v1 hash.
    UserStatus:
      type: string
      enum:
      - active
      - disabled
      - locked
      description: Internal user status. Gateway admin/profile resources may expose this field through auth-owned public contracts.
    ManagedUserRole:
      type: string
      enum:
      - standard
      - admin
      description: Role values assignable through admin user management. super_admin is intentionally excluded.
    UserSummary:
      type: object
      required:
      - id
      - username
      - roles
      - permissions
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
          description: Optional display name. May be empty; clients may fall back to username.
        email:
          type: string
          format: email
          nullable: true
          description: Optional non-unique profile email. Not a login identifier.
        phone:
          type: string
          nullable: true
          description: Optional non-unique profile phone. Not a login identifier.
        status:
          $ref: '#/components/schemas/UserStatus'
        mustChangePassword:
          type: boolean
          description: True when the user must complete required password change before normal app access.
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    UserRecord:
      allOf:
      - $ref: '#/components/schemas/UserSummary'
      - type: object
        required:
        - status
        - mustChangePassword
        - createdAt
        - updatedAt
        properties:
          status:
            $ref: '#/components/schemas/UserStatus'
          mustChangePassword:
            type: boolean
          createdAt:
            type: string
            format: date-time
          updatedAt:
            type: string
            format: date-time
    UpdateUserProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 128
          description: Optional display name. Empty string is allowed.
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
          description: Optional non-unique profile email. Blank/null clears the field.
        phone:
          type: string
          nullable: true
          maxLength: 32
          description: Optional non-unique profile phone. Blank/null clears the field.
    CreatePasswordChangeRequest:
      type: object
      required:
      - currentPassword
      - newPassword
      - newPasswordConfirmation
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 1
          maxLength: 1024
          writeOnly: true
          description: Current temporary password that auth verifies before replacing it.
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 1024
          writeOnly: true
        newPasswordConfirmation:
          type: string
          format: password
          minLength: 8
          maxLength: 1024
          writeOnly: true
    AdminUser:
      allOf:
      - $ref: '#/components/schemas/UserRecord'
      - type: object
        properties:
          manageableRoles:
            type: array
            items:
              $ref: '#/components/schemas/ManagedUserRole'
          actions:
            type: object
            required:
            - canDisable
            - canEnable
            - canResetPassword
            - canChangeRole
            properties:
              canDisable:
                type: boolean
              canEnable:
                type: boolean
              canResetPassword:
                type: boolean
              canChangeRole:
                type: boolean
    CreateAdminUserRequest:
      type: object
      required:
      - username
      - temporaryPassword
      - role
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 128
        temporaryPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 1024
          writeOnly: true
          description: Administrator-entered temporary password. Auth hashes it and sets must_change_password=true.
        role:
          $ref: '#/components/schemas/ManagedUserRole'
        displayName:
          type: string
          maxLength: 128
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
        phone:
          type: string
          nullable: true
          maxLength: 32
    UpdateAdminUserRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 128
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
        phone:
          type: string
          nullable: true
          maxLength: 32
        status:
          type: string
          enum:
          - active
          - disabled
        role:
          $ref: '#/components/schemas/ManagedUserRole'
      description: Omitted fields are unchanged. Role updates replace the managed role with exactly one target role.
    CreateAdminPasswordResetRequest:
      type: object
      required:
      - temporaryPassword
      properties:
        temporaryPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 1024
          writeOnly: true
          description: Administrator-entered temporary password. Auth hashes it and sets must_change_password=true.
    SessionSummary:
      type: object
      required:
      - sessionId
      - accessToken
      - tokenType
      - expiresAt
      properties:
        sessionId:
          type: string
        accessToken:
          type: string
          minLength: 32
          example: atk_v1_7Qb4mK9xZ2nH8pL5rT1cV6yS3wE0aD
          x-token-format: opaque
          description: Opaque bearer credential sent by the frontend on later requests. This is not a JWT and must never be logged or parsed for claims.
        tokenType:
          type: string
          enum:
          - Bearer
          default: Bearer
        expiresAt:
          type: string
          format: date-time
    SessionIdentity:
      type: object
      required:
      - sessionId
      - user
      - tokenType
      - status
      - expiresAt
      - issuedAt
      properties:
        sessionId:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
        tokenType:
          type: string
          enum:
          - Bearer
        status:
          type: string
          enum:
          - active
          description: Auth only returns active sessions from this resource; non-active sessions are rejected as unauthorized.
        expiresAt:
          type: string
          format: date-time
        issuedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
        revokeReason:
          type: string
          nullable: true
        accessTokenHash:
          type: string
          example: hmac-sha256:v1:6f1c2d3e4a5b
          description: Optional internal token hash for diagnostics. Uses the shared gateway/auth token hash rule; never return the original access token.
    UserPermissions:
      type: object
      required:
      - userId
      - roles
      - permissions
      - updatedAt
      properties:
        userId:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
    SessionResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - user
          - session
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            session:
              $ref: '#/components/schemas/SessionSummary'
        requestId:
          type: string
    UserResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/UserSummary'
        requestId:
          type: string
    UserRecordResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/UserRecord'
        requestId:
          type: string
    AdminUserResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/AdminUser'
        requestId:
          type: string
    AdminUserListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminUser'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    UserPermissionsResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/UserPermissions'
        requestId:
          type: string
    SessionIdentityResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/SessionIdentity'
        requestId:
          type: string
