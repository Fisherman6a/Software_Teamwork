    required: true
    sensitive: true
  AI_GATEWAY_SERVICE_TOKEN_HASHES:
    fromEnv: AI_GATEWAY_SERVICE_TOKEN_HASHES
    required: true
    sensitive: true
  AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY:
    fromEnv: AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY
