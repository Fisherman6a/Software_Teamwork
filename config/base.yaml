    fromEnv: POSTGRES_ADMIN_URL
    required: true
    sensitive: true
  AUTH_DATABASE_URL:
    fromEnv: AUTH_DATABASE_URL
    required: true
    sensitive: true
  FILE_DATABASE_URL:
    fromEnv: FILE_DATABASE_URL
    required: true
    sensitive: true
  KNOWLEDGE_DATABASE_URL:
    fromEnv: KNOWLEDGE_DATABASE_URL
