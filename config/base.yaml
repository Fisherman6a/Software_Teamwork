    sensitive: true
  GATEWAY_AUTH_ADMIN_SERVICE_TOKEN:
    fromEnv: GATEWAY_AUTH_ADMIN_SERVICE_TOKEN
    required: true
    sensitive: true
  TOKEN_HASH_SECRET:
