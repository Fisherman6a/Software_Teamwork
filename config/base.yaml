    sensitive: true
  MINIO_ROOT_USER:
    fromEnv: MINIO_ROOT_USER
    required: true
    sensitive: true
  MINIO_ROOT_PASSWORD:
    fromEnv: MINIO_ROOT_PASSWORD
    required: true
