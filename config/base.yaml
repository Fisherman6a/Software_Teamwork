version: 1
profile: base
description: Shared non-sensitive defaults and secret references for all profiles.
env:
  COMPOSE_PROJECT_NAME:
    value: software-teamwork-local
    description: Local Docker Compose project name.
  POSTGRES_PORT:
    value: "5432"
  REDIS_PORT:
    value: "6379"
  MINIO_API_PORT:
    value: "9000"
  MINIO_CONSOLE_PORT:
    value: "9001"
  KNOWLEDGE_RUNTIME_ELASTICSEARCH_PORT:
    value: "9200"
  POSTGRES_IMAGE:
    value: postgres:16-alpine
  REDIS_IMAGE:
    value: redis:7-alpine
  MINIO_IMAGE:
    value: minio/minio:RELEASE.2025-09-07T16-13-09Z
  MINIO_MC_IMAGE:
    value: minio/mc:RELEASE.2025-08-13T08-35-41Z
  GATEWAY_HTTP_PORT:
