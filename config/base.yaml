  DOCUMENT_AI_GATEWAY_MODEL:
    value: local-placeholder-chat
  DOCUMENT_AI_GATEWAY_SERVICE_TOKEN:
    fromEnv: DOCUMENT_AI_GATEWAY_SERVICE_TOKEN
    required: true
    sensitive: true
  DOCUMENT_KNOWLEDGE_SERVICE_URL:
