name: Docker and Deploy Checks

on:
  pull_request:
    branches: [develop]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'services/**'
      - 'deploy/**'
      - 'docs/README.md'
      - 'docs/runbooks/local-integration.md'
      - 'docs/runbooks/docker-image-pull-environment.md'
      - 'docs/testing/strategy.md'
      - 'docs/testing/test-matrix.md'
      - 'docs/architecture/technology-decisions.md'
      - '.trellis/spec/cicd.md'
      - '.trellis/spec/backend/quality-guidelines.md'
      - '.trellis/spec/backend/directory-structure.md'
      - '.github/codex/prompts/review.md'
      - 'scripts/check_docker_policy.py'
      - 'scripts/check_docker_environment.py'
      - 'scripts/tests/test_check_docker_environment.py'
      - 'scripts/tests/test_check_docker_policy.py'
      - '.github/workflows/docker-deploy-checks.yml'
  push:
    branches: [develop]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'services/**'
      - 'deploy/**'
      - 'docs/README.md'
      - 'docs/runbooks/local-integration.md'
      - 'docs/runbooks/docker-image-pull-environment.md'
      - 'docs/testing/strategy.md'
      - 'docs/testing/test-matrix.md'
      - 'docs/architecture/technology-decisions.md'
      - '.trellis/spec/cicd.md'
      - '.trellis/spec/backend/quality-guidelines.md'
      - '.trellis/spec/backend/directory-structure.md'
      - '.github/codex/prompts/review.md'
      - 'scripts/check_docker_policy.py'
      - 'scripts/check_docker_environment.py'
      - 'scripts/tests/test_check_docker_environment.py'
      - 'scripts/tests/test_check_docker_policy.py'
      - '.github/workflows/docker-deploy-checks.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      compose-files: ${{ steps.changed.outputs.compose-files }}
      has-compose-files: ${{ steps.changed.outputs.has-compose-files }}
      has-policy-check: ${{ steps.changed.outputs.has-policy-check }}
    steps:
      - name: Detect Docker and Compose changes
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const knownComposeFiles = new Set([
              'deploy/docker-compose.yml',
            ]);
            const composeFilePattern =
              /^deploy\/.*docker-compose[^/]*\.ya?ml$/u;
            const rootDeployComposeFile = 'deploy/docker-compose.yml';
            const rootDeployComposeDependencyPattern =
              /^deploy\/(?:\.env\.example|postgres\/init\/.+)$/u;
            const workflowPath = '.github/workflows/docker-deploy-checks.yml';
            const dockerPolicyPaths = new Set([
              'README.md',
              'AGENTS.md',
              'deploy/README.md',
              'docs/README.md',
              'docs/runbooks/local-integration.md',
              'docs/runbooks/docker-image-pull-environment.md',
              'docs/testing/strategy.md',
              'docs/testing/test-matrix.md',
              'docs/architecture/technology-decisions.md',
              '.trellis/spec/cicd.md',
              '.trellis/spec/backend/quality-guidelines.md',
              '.trellis/spec/backend/directory-structure.md',
              '.github/codex/prompts/review.md',
              'scripts/check_docker_policy.py',
              'scripts/check_docker_environment.py',
              'scripts/tests/test_check_docker_environment.py',
              'scripts/tests/test_check_docker_policy.py',
            ]);

            const changedFiles = new Set();
            const addChangedFile = (file) => {
              if (file.filename) {
                changedFiles.add(file.filename);
              }
              if (file.previous_filename) {
                changedFiles.add(file.previous_filename);
              }
            };

            if (context.eventName === 'pull_request') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              for (const file of files) {
                addChangedFile(file);
              }
            } else if (context.eventName === 'push') {
              const response = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${context.payload.before}...${context.payload.after}`,
              });
              for (const file of response.data.files || []) {
                addChangedFile(file);
              }
            }

            const files = [...changedFiles];
            const workflowChanged = files.includes(workflowPath);
            const dockerPolicyChanged = files.some((file) => dockerPolicyPaths.has(file));
            const fullDockerCheckChanged = workflowChanged;
            const composeFiles = new Set();
            if (fullDockerCheckChanged) {
              for (const composeFile of knownComposeFiles) {
                composeFiles.add(composeFile);
              }
            } else {
              for (const file of files) {
                if (
                  composeFilePattern.test(file) &&
                  knownComposeFiles.has(file)
                ) {
                  composeFiles.add(file);
                  continue;
                }

                if (rootDeployComposeDependencyPattern.test(file)) {
                  composeFiles.add(rootDeployComposeFile);
                }
              }
            }

            const hasPolicyCheck =
              fullDockerCheckChanged ||
              dockerPolicyChanged ||
              composeFiles.size > 0;

            core.info(`Changed files: ${files.join(', ') || '(none)'}`);
            core.info(`Full Docker check requested: ${fullDockerCheckChanged}`);
            core.info(`Docker policy check requested: ${hasPolicyCheck}`);
            core.info(`Compose files: ${[...composeFiles].join(', ') || '(none)'}`);
            core.setOutput('compose-files', JSON.stringify([...composeFiles].sort()));
            core.setOutput(
              'has-compose-files',
              composeFiles.size > 0 ? 'true' : 'false'
            );
            core.setOutput(
              'has-policy-check',
              hasPolicyCheck ? 'true' : 'false'
            );

  policy-check:
    needs: detect
    if: needs.detect.outputs.has-policy-check == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Docker policy checker
        run: python3 -m unittest scripts.tests.test_check_docker_policy scripts.tests.test_check_docker_environment

      - name: Validate Docker policy
        run: python3 scripts/check_docker_policy.py

      - name: Validate Docker environment diagnostic
        run: python3 scripts/check_docker_environment.py --skip-network --clean-env

  compose-config:
    needs: [detect, policy-check]
    if: needs.detect.outputs.has-compose-files == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compose-file: ${{ fromJSON(needs.detect.outputs.compose-files) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        env:
          COMPOSE_FILE: ${{ matrix.compose-file }}
        run: |
          compose_file="$COMPOSE_FILE"
          if [ "$compose_file" = "deploy/docker-compose.yml" ]; then
            docker compose -f "$compose_file" --env-file deploy/.env.example config --quiet
          else
            docker compose -f "$compose_file" config --quiet
          fi
