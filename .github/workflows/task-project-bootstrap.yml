name: Task Project Bootstrap

on:
  workflow_dispatch:
    inputs:
      create_views:
        description: Create missing GitHub Project views
        required: true
        type: boolean
        default: true
      migrate_issues:
        description: Sync existing managed task issues into the GitHub Project
        required: true
        type: boolean
        default: true
      dry_run:
        description: Report intended changes without writing Project fields or issue bodies
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create task views and migrate existing issues
        uses: actions/github-script@v7
        env:
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          CREATE_VIEWS: ${{ inputs.create_views }}
          MIGRATE_ISSUES: ${{ inputs.migrate_issues }}
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const { getOctokit } = require('@actions/github');

            const projectOwner = 'Sakayori-Iroha-168';
            const projectNumber = 1;
            const projectName = 'Software Teamwork';
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;
            const createViews = process.env.CREATE_VIEWS === 'true';
            const migrateIssues = process.env.MIGRATE_ISSUES === 'true';
            const dryRun = process.env.DRY_RUN === 'true';
            const projectToken = process.env.PROJECTS_TOKEN;

            if (!projectToken) {
              core.setFailed('PROJECTS_TOKEN is required for Project view creation and migration.');
              return;
            }

            const projectOctokit = getOctokit(projectToken);
            const projectGraphql = projectOctokit.graphql;

            const defaultGroupByPrefix = {
              A: 'L1nggTeam',
              B: 'JerryTeam',
              C: 'PrimeTeam',
              F: 'Frontend',
              S: 'Special',
            };

            const viewByPrefix = {
              A: 'Platform View',
              B: 'QA View',
              C: 'Report View',
              F: 'Frontend View',
              S: 'Special View',
            };

            const moduleLabelByModule = {
              gateway: 'service:gateway',
              auth: 'service:auth',
              file: 'service:file',
              qa: 'service:qa',
              knowledge: 'service:knowledge',
              document: 'service:document',
              frontend: 'frontend',
              deploy: 'deployment',
              ci: 'ci',
              openapi: 'documentation',
            };

            const desiredViews = [
              { name: 'All Tasks', filter: 'is:issue' },
              { name: 'Platform View', filter: 'is:issue Group:"L1nggTeam"' },
              { name: 'QA View', filter: 'is:issue Group:"JerryTeam"' },
              { name: 'Report View', filter: 'is:issue Group:"PrimeTeam"' },
              { name: 'Frontend View', filter: 'is:issue Group:"Frontend"' },
              { name: 'Special View', filter: 'is:issue Group:"Special"' },
              { name: 'Dependency View', filter: 'is:issue' },
            ];

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const cleanValue = (value) => String(value || '')
              .trim()
              .replace(/^`|`$/g, '')
              .replace(/`/g, '')
              .trim();

            const readField = (body, label) => {
              const pattern = new RegExp(`^-\\s*${escapeRegExp(label)}\\s*[:：]\\s*(.+)$`, 'imu');
              const match = (body || '').match(pattern);
              return match ? cleanValue(match[1]) : '';
            };

            const normalizeDependency = (value) => {
              const normalized = cleanValue(value);
              if (!normalized || normalized === '无') {
                return '无';
              }
              return normalized
                .split(/[，,、]/u)
                .map((item) => cleanValue(item))
                .filter(Boolean)
                .join(', ') || '无';
            };

            const projectStatusFor = (issueStatus) => {
              const projectStatusByIssueStatus = {
                Draft: 'Todo',
                Ready: 'Todo',
                Blocked: 'In Progress',
                'In Progress': 'In Progress',
                Review: 'In Progress',
                Done: 'Done',
              };
              return projectStatusByIssueStatus[issueStatus] || 'Todo';
            };

            const riskFor = (issueStatus, explicitRisk) => {
              if (issueStatus === 'Blocked') {
                return 'Blocked';
              }
              if (issueStatus === 'Draft') {
                return explicitRisk || 'Needs Decision';
              }
              return 'Normal';
            };

            const projectQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                    views(first: 100) {
                      nodes {
                        id
                        name
                      }
                    }
                  }
                }
              }
            `;

            const itemQuery = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 50) {
                      nodes {
                        id
                        project {
                          id
                          title
                        }
                      }
                    }
                  }
                }
              }
            `;

            const addItemMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item {
                    id
                  }
                }
              }
            `;

            const updateFieldMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: $value
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            const fetchProject = async () => {
              const result = await projectGraphql(projectQuery, {
                login: projectOwner,
                number: projectNumber,
              });
              const project = result.user?.projectV2;
              if (!project) {
                throw new Error(`Project '${projectName}' was not found for ${projectOwner}.`);
              }
              return project;
            };

            let project = await fetchProject();

            if (createViews) {
              const existingViewNames = new Set(project.views.nodes.filter(Boolean).map((view) => view.name));

              for (const view of desiredViews) {
                if (existingViewNames.has(view.name)) {
                  core.info(`Project view '${view.name}' already exists.`);
                  continue;
                }

                if (dryRun) {
                  core.info(`[dry-run] Would create Project view '${view.name}' with filter '${view.filter}'.`);
                  continue;
                }

                await github.request('POST /users/{username}/projectsV2/{project_number}/views', {
                  username: projectOwner,
                  project_number: projectNumber,
                  name: view.name,
                  filter: view.filter,
                  layout: 'table_layout',
                  headers: {
                    authorization: `Bearer ${projectToken}`,
                    'X-GitHub-Api-Version': '2022-11-28',
                  },
                });
                core.info(`Created Project view '${view.name}'.`);
              }

              project = await fetchProject();
            }

            const fieldByName = new Map();
            for (const field of project.fields.nodes.filter(Boolean)) {
              fieldByName.set(field.name, field);
            }

            const updateSingleSelect = async (itemId, fieldName, optionName) => {
              const field = fieldByName.get(fieldName);
              if (!field?.options) {
                core.warning(`Project field '${fieldName}' is missing or is not single-select.`);
                return;
              }
              const option = field.options.find((candidate) => candidate.name === optionName);
              if (!option) {
                core.warning(`Project field '${fieldName}' has no option '${optionName}'.`);
                return;
              }
              await projectGraphql(updateFieldMutation, {
                projectId: project.id,
                itemId,
                fieldId: field.id,
                value: { singleSelectOptionId: option.id },
              });
            };

            const updateText = async (itemId, fieldName, text) => {
              const field = fieldByName.get(fieldName);
              if (!field) {
                core.warning(`Project field '${fieldName}' is missing.`);
                return;
              }
              await projectGraphql(updateFieldMutation, {
                projectId: project.id,
                itemId,
                fieldId: field.id,
                value: { text },
              });
            };

            const updateIssueBodySyncState = async (issue, syncState) => {
              const body = issue.body || '';
              const syncLinePattern = /^- Project sync：`?(pending|synced|blocked)`?`?$/imu;
              const nextSyncLine = `- Project sync：\`${syncState}\``;
              let nextBody = body;

              if (syncLinePattern.test(nextBody)) {
                nextBody = nextBody.replace(syncLinePattern, nextSyncLine);
              } else {
                nextBody = `${nextBody.trimEnd()}\n${nextSyncLine}\n`;
              }

              if (nextBody !== body) {
                await github.rest.issues.update({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  body: nextBody,
                });
              }
            };

            const addIssueLabels = async (issue, group, moduleName) => {
              const labelsToAdd = new Set();
              if (['L1nggTeam', 'JerryTeam', 'PrimeTeam'].includes(group)) {
                labelsToAdd.add(group);
              }
              if (group === 'Frontend') {
                labelsToAdd.add('frontend');
              }
              const moduleLabel = moduleLabelByModule[moduleName];
              if (moduleLabel) {
                labelsToAdd.add(moduleLabel);
              }
              if (labelsToAdd.size === 0) {
                return;
              }

              const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner: repoOwner,
                repo: repoName,
                per_page: 100,
              });
              const existingLabelNames = new Set(existingLabels.map((label) => label.name));
              const validLabels = [...labelsToAdd].filter((label) => existingLabelNames.has(label));
              const missingLabels = [...labelsToAdd].filter((label) => !existingLabelNames.has(label));

              if (missingLabels.length > 0) {
                core.warning(`Skipping missing labels for #${issue.number}: ${missingLabels.join(', ')}`);
              }
              if (validLabels.length > 0) {
                await github.rest.issues.addLabels({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  labels: validLabels,
                });
              }
            };

            if (!migrateIssues) {
              core.info('Issue migration disabled by input.');
              return;
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: repoOwner,
              repo: repoName,
              state: 'all',
              per_page: 100,
            });

            let considered = 0;
            let synced = 0;
            let blocked = 0;

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const titleMatch = (issue.title || '').match(/^\[([SABCF]-(?:\d{8}-)?\d{2})\]\s+.+$/u);
              const body = issue.body || '';
              if (!titleMatch || !body.includes('GitHub Project') || !body.includes(projectName)) {
                continue;
              }

              considered += 1;
              const taskCode = titleMatch[1];
              const prefix = taskCode[0];
              const group = defaultGroupByPrefix[prefix];
              const bodyGroup = readField(body, '主责小组');
              if (bodyGroup && bodyGroup !== group) {
                core.warning(`Issue #${issue.number} body group '${bodyGroup}' does not match task prefix '${prefix}'; using '${group}'.`);
              }
              const issueStatus = readField(body, '状态') || 'Draft';
              const priority = readField(body, '优先级') || 'P1';
              const batch = readField(body, '批次') || 'Batch 4';
              const moduleName = readField(body, '模块') || 'ci';
              const dependency = normalizeDependency(readField(body, '依赖任务'));
              const projectStatus = projectStatusFor(issueStatus);
              const risk = riskFor(issueStatus, readField(body, 'Risk'));
              const viewName = viewByPrefix[prefix] || 'All Tasks';

              core.info(
                `Task #${issue.number} ${taskCode}: ${viewName}, Group=${group}, Status=${projectStatus}, Priority=${priority}, Batch=${batch}, Module=${moduleName}, Risk=${risk}, Dependency=${dependency}`
              );

              if (dryRun) {
                continue;
              }

              let syncState = 'blocked';
              try {
                let itemResult = await projectGraphql(itemQuery, { issueId: issue.node_id });
                let item = itemResult.node.projectItems.nodes.find((node) => node.project.id === project.id);

                if (!item) {
                  const added = await projectGraphql(addItemMutation, {
                    projectId: project.id,
                    contentId: issue.node_id,
                  });
                  item = added.addProjectV2ItemById.item;
                }

                await updateSingleSelect(item.id, 'Status', projectStatus);
                await updateSingleSelect(item.id, 'Group', group);
                await updateSingleSelect(item.id, 'Priority', priority);
                await updateSingleSelect(item.id, 'Batch', batch);
                await updateSingleSelect(item.id, 'Module', moduleName);
                await updateSingleSelect(item.id, 'Risk', risk);
                await updateText(item.id, 'Dependency', dependency);
                await updateText(item.id, 'OwnerNote', `批量迁移自 issue #${issue.number}；任务编号 ${taskCode}；目标视图 ${viewName}。`);
                await addIssueLabels(issue, group, moduleName);
                syncState = 'synced';
                synced += 1;
              } catch (error) {
                blocked += 1;
                core.warning(`Failed to migrate issue #${issue.number}: ${error.message}`);
              }

              await updateIssueBodySyncState(issue, syncState);
            }

            if (dryRun) {
              core.info(`[dry-run] Considered ${considered} task issues.`);
            } else {
              core.info(`Migrated ${synced} task issues; ${blocked} task issues blocked.`);
            }
