name: Knowledge Runtime

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/knowledge-runtime/**'
      - '.github/workflows/knowledge-runtime.yml'
  push:
    branches: [develop]
    paths:
      - 'services/knowledge-runtime/**'
      - '.github/workflows/knowledge-runtime.yml'

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/knowledge-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run targeted pytest
        env:
          PYTHONPATH: .
        run: >
          uv run --no-project
          --with pytest
          --with pytest-asyncio
          --with filelock
          --with ruamel-yaml
          python -m pytest
          test/routes/test_config_utils.py
          test/routes/test_route_registry.py
          -q
